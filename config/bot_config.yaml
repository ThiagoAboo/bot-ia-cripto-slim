general:
  trade_mode: simulated
  log_level: INFO
  trace_enabled: true
  dynamic_symbols_enabled: true
  auto_trade_social: true
  data_fetch_interval_seconds: 5
  hot_reload_config: true

binance:
  api_key: ${BINANCE_API_KEY}
  api_secret: ${BINANCE_SECRET}
  rest_base_url: https://api.binance.com
  ws_base_url: wss://stream.binance.com:9443/stream
  recv_window_ms: 5000
  use_bnb_for_fees: true
  taker_fee_percent: 0.1
  bnb_reserve: 0.02
  bnb_auto_buy:
    enabled: true
    threshold_buffer: 0.10
    max_spend_percent_of_daily_profit: 5.0

analysis:
  value_zscore_periods: 50
  micro_trade_windows:
    - window_seconds: 15
      weight: 0.2
    - window_seconds: 30
      weight: 0.3
    - window_seconds: 60
      weight: 0.5
  momentum_resolutions:
    - "1m"
    - "15m"
    - "30m"
    - "1h"
    - "4h"
    - "12h"
    - "24h"
    - "1w"
    - "1M"
  momentum_weights:
    micro: 0.4
    standard: 0.6
  volume_anomaly_threshold: 2.0
  rss_feed_url: https://cryptopanic.com/news/free/feed/
  rss_max_entries: 30
  rss_non_english_fallback: neutral

social:
  source: apewisdom
  endpoint: https://apewisdom.io/api/v1.0/filter/all-crypto/page/1
  update_interval_hours: 12
  strong_threshold: 0.65
  boost_factor: 1.2
  auto_add_strong_symbols: true
  strong_keep_minutes: 60

ai_model:
  default_model_name: random_forest
  active_model_id: bootstrap-rf
  models_path: /app/config/models
  inference_batch_size: 10
  min_confidence: 0.6
  label_horizon_candles: 6
  training:
    auto_collect_candles: true
    candle_limit: 5000
    history_days: 180
    test_size: 0.2
    random_state: 42

risk:
  max_position_per_symbol: 0.1
  stop_loss_pct: 2.0
  min_liquidity_score: 0.3
  simulated_initial_balance: 10000.0
  default_order_percent: 0.08
  min_order_usdt: 15.0

tracing:
  db_path: /app/data/bot.db
  retention_days: 30

webui:
  enabled: true
  host: 0.0.0.0
  port: 8080
  session_secret: ${WEBUI_SECRET_KEY}
  authentication:
    username: admin
    password_hash: plain:admin123
