version: "3.8"

services:
  bot:
    build: .
    container_name: bot-ia-cripto
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_SECRET: ${BINANCE_SECRET:-}
      TRADE_MODE: ${TRADE_MODE:-simulated}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped
